<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Make a Reservation', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <h2 class="fw-bold mb-0">Make a Reservation</h2>
            <a class="btn btn-outline-secondary flex-shrink-0" th:href="@{/reservation/track}">
                <i class="fa fa-search me-2"></i> Track Your Reservation
            </a>
        </div>
        <p class="text-accent mb-4">
            Choose your event and seating, then fill in your details.
        </p>

        <div class="row">
            <div class="col-lg-7">
                <div class="card shadow-sm card-top-primary mb-4">
                    <div class="card-body p-4">
                        <form method="post" novalidate th:action="@{/reservation}" th:object="${reservation}">

                            <div th:replace="~{reservation/fragments :: input}"></div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-paper-plane me-2"></i> Submit Request
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/}">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <h5 class="text-accent text-uppercase mb-3 small ls-wide">
                    <i class="fa fa-info-circle me-1"></i> Events
                </h5>

                <div class="alert alert-info shadow-sm" th:if="${#lists.isEmpty(events)}">
                    <i class="fa fa-info-circle me-1"></i> No active events available.
                </div>

                <div th:unless="${#lists.isEmpty(events)}">
                    <div class="card rounded-3 shadow-sm border-0 overflow-hidden mb-3" th:each="event : ${events}">
                        <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center"
                             data-bs-toggle="collapse" role="button"
                             th:attr="data-bs-target='#eventBody-' + ${event.id}">
                            <h6 class="mb-0 fw-medium ls-wide text-light">
                                <i class="fa fa-calendar-alt text-primary me-2"></i>
                                <span th:text="${event.name}">Event Name</span>
                            </h6>

                            <i class="fa fa-chevron-down text-light ms-2"></i>
                        </div>

                        <!-- Collapsible Body -->
                        <div class="collapse" th:id="${'eventBody-' + event.id}">
                            <div class="card-body py-3 px-4">

                                <!-- Description -->
                                <p class="text-secondary mb-4" th:if="${event.description}"
                                   th:text="${event.description}"></p>

                                <div class="d-flex align-items-center gap-4 mb-4 text-dark fw-bold">

                                    <span class="d-flex align-items-center">
                                        <i class="fa fa-calendar-alt text-accent me-2"></i>
                                        <th:block th:if="${event.startDate.equals(event.endDate)}"
                                                  th:text="${#temporals.format(event.startDate, 'MMMM dd, yyyy')}"></th:block>
                                        <th:block
                                                th:if="${!event.startDate.equals(event.endDate) and event.startDate.monthValue == event.endDate.monthValue and event.startDate.year == event.endDate.year}"
                                                th:text="${#temporals.format(event.startDate, 'MMMM dd') + ' - ' + event.endDate.dayOfMonth + ', ' + #temporals.format(event.endDate, 'yyyy')}"></th:block>
                                        <th:block
                                                th:if="${!event.startDate.equals(event.endDate) and (event.startDate.monthValue != event.endDate.monthValue or event.startDate.year != event.endDate.year)}"
                                                th:text="${#temporals.format(event.startDate, 'MMMM dd') + ' - ' + #temporals.format(event.endDate, 'MMMM dd, yyyy')}"></th:block>
                                    </span>

                                    <span class="fw-medium text-secondary">
                                        <i class="fa fa-clock opacity-50 me-1"></i>
                                        <th:block th:text="${event.duration + ' min'}"></th:block>
                                    </span>

                                    <span class="ms-auto fs-5"
                                          th:text="${'$' + #numbers.formatDecimal(event.price, 1, 2)}"></span>
                                </div>

                                <!-- Seatings -->
                                <p class="text-accent mb-2">Seatings</p>
                                <div class="row g-0 align-items-center py-2 border-bottom-dashed border-light-subtle"
                                     th:each="seating : ${seatings}" th:if="${seating.eventId == event.id}">

                                    <div class="col-3 col-md-2 fw-bold text-dark"
                                         th:text="${#temporals.format(seating.startDateTime, 'h:mm a')}">
                                    </div>

                                    <div class="col fw-medium text-primary" th:text="${seating.name}">
                                    </div>

                                    <div class="col-auto text-muted small ms-2" th:text="${seating.duration + ' min'}">
                                    </div>
                                </div>

                                <!-- Menu -->
                                <div class="mt-3" th:if="${event.menu != null}">
                                    <p class="text-accent mb-3">Menu</p>
                                    <span class="fw-medium d-block" th:text="${event.menu.name}"></span>
                                    <span class="text-muted d-block" th:if="${event.menu.description}"
                                          th:text="${event.menu.description}"></span>
                                    <span class="text-muted fst-italic d-block"
                                          th:unless="${event.menu.description}">No description provided.</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
