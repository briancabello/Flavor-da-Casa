<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Reservation Details', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/reservation/list}">Reservations</a></li>
                <li class="breadcrumb-item active" aria-current="page">Details</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Reservation Details</h2>
                    <a class="btn btn-outline-secondary" th:href="@{/reservation/list}">
                        <i class="fa fa-arrow-left me-1"></i> Back to List
                    </a>
                </div>

                <p class="text-accent mb-4">
                    Viewing the full details of this reservation request.
                </p>

                <div class="rounded-3 overflow-hidden border property-grid shadow-sm mb-4">
                    <div class="property-label-bg px-4 py-2 border-bottom">
                        <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">
                            <i class="fa fa-user me-1"></i> Guest Information
                        </span>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Name</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium"
                                  th:text="${reservation.guestFirstName + ' ' + reservation.guestLastName}"></span>
                        </div>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Email</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium" th:text="${reservation.email}"></span>
                        </div>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Group Size</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium" th:text="${reservation.groupSize}"></span>
                        </div>
                    </div>
                    <div class="row g-0">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Tracking ID</span>
                        </div>
                        <div class="col-8 p-3">
                            <code class="text-dark fw-medium" th:text="${reservation.uuid}"></code>
                        </div>
                    </div>
                </div>

                <div class="rounded-3 overflow-hidden border property-grid shadow-sm mb-4">
                    <div class="property-label-bg px-4 py-2 border-bottom">
                        <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">
                            <i class="fa fa-calendar-alt me-1"></i> Event &amp; Seating
                        </span>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Event</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium" th:text="${event != null ? event.name : 'N/A'}"></span>
                        </div>
                    </div>
                    <div class="row g-0 border-bottom" th:if="${event != null}">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Event Dates</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium"
                                  th:text="|${#temporals.format(event.startDate, 'MMM dd, yyyy')} - ${#temporals.format(event.endDate, 'MMM dd, yyyy')}|"></span>
                        </div>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Seating</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium"
                                  th:if="${seating != null}"
                                  th:text="${seating.name + ' - ' + #temporals.format(seating.startDateTime, 'MMM dd, yyyy h:mm a')}"></span>
                            <span class="text-dark fw-medium" th:if="${seating == null}">N/A</span>
                        </div>
                    </div>
                    <div class="row g-0">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Duration</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium"
                                  th:if="${seating != null}"
                                  th:text="${seating.duration + ' minutes'}"></span>
                            <span class="text-dark fw-medium" th:if="${seating == null}">N/A</span>
                        </div>
                    </div>
                </div>

                <div class="rounded-3 overflow-hidden border property-grid shadow-sm mb-4">
                    <div class="property-label-bg px-4 py-2 border-bottom">
                        <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">
                            <i class="fa fa-info-circle me-1"></i> Status
                        </span>
                    </div>
                    <div class="row g-0 border-bottom">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Status</span>
                        </div>
                        <div class="col-8 p-3">
                            <span th:class="${reservation.status == 'approved' ? 'badge bg-success' :
                                             (reservation.status == 'denied' ? 'badge bg-danger' : 'badge bg-warning text-dark')}"
                                  th:text="${#strings.capitalize(reservation.status)}">
                            </span>
                        </div>
                    </div>
                    <div class="row g-0" th:if="${reservation.assignedTableId != null}">
                        <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                            <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Assigned Table</span>
                        </div>
                        <div class="col-8 p-3">
                            <span class="text-dark fw-medium" th:text="${'Table #' + reservation.assignedTableId}"></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a class="btn btn-outline-secondary" th:href="@{/reservation/list}">
                        <i class="fa fa-arrow-left me-1"></i> Back to List
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
