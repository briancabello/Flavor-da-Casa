<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Reservation Details', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{reservation/fragments :: reservationBreadcrumb('Details', null, null)}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Reservation Details</h2>
                    <a class="btn btn-outline-secondary flex-shrink-0" th:href="@{/reservation/list}">
                        <i class="fa-solid fa-arrow-left me-1"></i> Back to List
                    </a>
                </div>

                <div th:replace="~{reservation/fragments :: successAlert(${reservationName}, ${action})}"></div>
                <div class="alert alert-danger alert-dismissible fade show small" role="alert" th:if="${errorMessage}">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert" type="button"></button>
                </div>

                <div th:replace="~{reservation/fragments :: info}"></div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
