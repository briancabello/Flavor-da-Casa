<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Track Reservation', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{reservation/fragments :: reservationBreadcrumb('Track', null, null)}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <h2 class="mb-3">Track Your Reservation</h2>
                <p class="text-accent mb-4">
                    View the current status of your reservation request.
                </p>

                <div class="alert alert-warning" th:if="${notFound}">
                    <i class="fa fa-exclamation-triangle me-1"></i>
                    No reservation found for the provided tracking ID.
                </div>

                <div th:if="${reservation}">
                    <div th:replace="~{reservation/fragments :: details}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
