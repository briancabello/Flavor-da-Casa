<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Reservation Submitted', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/reservation}">Reservations</a></li>
                <li class="breadcrumb-item active" aria-current="page">Confirmation</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm card-top-primary">
                    <div class="card-body p-4 text-center">
                        <i class="fa fa-check-circle text-success" style="font-size: 4rem;"></i>
                        <h2 class="fw-bold mt-3">Reservation Request Submitted!</h2>
                        <p class="text-muted mt-2">
                            Your reservation request has been received and is currently <strong>pending</strong> review.
                        </p>

                        <div class="alert alert-info mt-3" th:if="${uuid}">
                            <strong>Your Tracking ID:</strong>
                            <br>
                            <code class="fs-5" th:text="${uuid}"></code>
                            <br>
                            <small class="text-muted">Save this ID to check your reservation status later.</small>
                        </div>

                        <div class="mt-4">
                            <a class="btn btn-primary px-4" th:href="@{/reservation}">
                                <i class="fa fa-plus me-2"></i> Make Another Reservation
                            </a>
                            <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/}">
                                <i class="fa fa-home me-2"></i> Go Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
