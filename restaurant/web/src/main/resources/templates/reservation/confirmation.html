<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Reservation Submitted', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{reservation/fragments :: reservationBreadcrumb('Confirmation', null, null)}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm card-top-primary">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-circle-check text-success display-icon"></i>
                            <h2 class="fw-bold mt-3">Reservation Request Received!</h2>
                            <p class="text-muted">
                                Thank you! Your reservation request has been submitted and is currently being reviewed.
                            </p>
                        </div>

                        <div class="rounded-3 overflow-hidden border property-grid mb-4" th:if="${uuid}">
                            <div class="row g-0">
                                <div class="col-4 p-3 d-flex align-items-center property-label-bg">
                                    <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Your Reservation Code</span>
                                </div>
                                <div class="col-8 p-3 d-flex align-items-center">
                                    <code class="fs-5" th:text="${uuid}"></code>
                                </div>
                            </div>
                        </div>

                        <p class="text-muted small text-center mb-4">
                            Please save this code to check your reservation details and status later.
                        </p>

                        <div class="d-flex justify-content-center gap-2 flex-wrap">
                            <a class="btn btn-primary px-4" th:href="@{/reservation/track(uuid=${uuid})}"
                               th:if="${uuid}">
                                <i class="fa-solid fa-receipt me-2"></i> Check Reservation
                            </a>
                            <a class="btn btn-outline-primary px-4" th:href="@{/reservation}">
                                <i class="fa-solid fa-calendar-plus me-2"></i> Make Another Reservation
                            </a>
                            <a class="btn btn-outline-secondary px-4" th:href="@{/}">
                                <i class="fa fa-home me-2"></i> Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
