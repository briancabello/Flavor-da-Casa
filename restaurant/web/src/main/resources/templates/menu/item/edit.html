<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Edit Menu Item', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <nav aria-label="breadcrumb" class="bg-light-subtle py-3 border-bottom mb-4">
        <div class="container small">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee" th:href="@{/}"><i
                        class="fa fa-home me-1"></i> Home</a></li>
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee" th:href="@{/menu}">Menus</a>
                </li>
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee"
                                               th:href="@{/menu/edit/{id}(id=${menuId})}">Edit Menu</a></li>
                <li aria-current="page" class="breadcrumb-item active text-muted">Edit Item</li>
            </ol>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">

                <h2>Edit Menu Item</h2>

                <div class="card shadow-sm card-top-primary">
                    <div class="card-body p-4">
                        <form method="post"
                              novalidate
                              th:action="@{/menu/{menuId}/item/edit/{id}(menuId=${menuId}, id=${menuItem.id})}" th:object="${menuItem}">
                            <div class="alert alert-danger shadow-sm" role="alert" th:if="${#fields.hasGlobalErrors()}">
                                <i class="fa fa-exclamation-circle me-2"></i>
                                <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide" for="name">Item
                                    Name</label>
                                <input class="form-control" id="name" placeholder="e.g. Garlic Bread"
                                       th:errorclass="is-invalid"
                                       th:field="*{name}" type="text">
                                <div class="invalid-feedback fw-medium" th:errors="*{name}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide" for="description">Description</label>
                                <textarea class="form-control" id="description"
                                          placeholder="e.g. Toasted with garlic butter" rows="3"
                                          th:errorclass="is-invalid" th:field="*{description}"></textarea>
                                <div class="invalid-feedback fw-medium" th:errors="*{description}"></div>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-save me-2"></i> Update Item
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4"
                                   th:href="@{/menu/edit/{id}(id=${menuId})}">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
