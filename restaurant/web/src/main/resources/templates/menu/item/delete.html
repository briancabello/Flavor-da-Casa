<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Delete Menu Item', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <nav aria-label="breadcrumb" class="bg-light-subtle py-3 border-bottom mb-4">
        <div class="container small">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee" th:href="@{/}"><i
                        class="fa fa-home me-1"></i> Home</a></li>
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee" th:href="@{/menu}">Menus</a>
                </li>
                <li class="breadcrumb-item"><a class="text-decoration-none text-coffee"
                                               th:href="@{/menu/edit/{id}(id=${menuId})}">Edit Menu</a></li>
                <li aria-current="page" class="breadcrumb-item active text-muted">Delete Item</li>
            </ol>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center text-center">
            <div class="col-12 col-md-8 col-lg-6">
                <i class="fas fa-exclamation-triangle text-danger fa-4x mb-3"></i>

                <h2>Delete Menu Item</h2>

                <p class="text-accent mb-4">
                    Are you sure you want to delete this menu item? This action cannot be undone.
                </p>

                <div class="card shadow-sm border-0 mb-4 text-start">
                    <div class="card-body p-4 bg-white rounded-3">
                        <div class="row mb-0">
                            <div class="col-6">
                                <h6 class="text-muted text-uppercase fw-bold ls-wide mb-1">Name</h6>
                                <p class="fs-5 mb-0" th:text="${menuItem.name}">Item Name</p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-muted text-uppercase fw-bold ls-wide mb-1">Description</h6>
                                <p class="fs-5 mb-0" th:text="${menuItem.description}">Description</p>
                            </div>
                        </div>
                    </div>
                </div>

                <form method="post" th:action="@{/menu/{menuId}/item/delete/{id}(menuId=${menuId}, id=${menuItem.id})}">
                    <button class="btn btn-danger px-4" type="submit">
                        <i class="fa fa-trash me-2"></i> Confirm Delete
                    </button>
                    <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/menu/edit/{id}(id=${menuId})}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
