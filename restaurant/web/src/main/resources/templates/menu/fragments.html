<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<nav aria-label="breadcrumb" class="bg-light-subtle py-3 border-bottom mb-4"
     th:fragment="menuBreadcrumb(currentPage, menuName, menuUrl)">
    <div class="container small">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
                <a class="text-decoration-none text-coffee" th:href="@{/}">
                    <i class="fa fa-home me-1"></i> Home
                </a>
            </li>
            <li class="breadcrumb-item" th:classappend="${currentPage == 'Menus'} ? ' active text-muted' : ''">
                <a class="text-decoration-none text-coffee" th:href="@{/menu}"
                   th:if="${currentPage != 'Menus'}">Menus</a>
                <span th:if="${currentPage == 'Menus'}">Menus</span>
            </li>
            <li class="breadcrumb-item" th:if="${menuName != null and menuUrl != null}">
                <a class="text-decoration-none text-coffee" th:href="${menuUrl}" th:text="${menuName}">Menu</a>
            </li>
            <li aria-current="page" class="breadcrumb-item active text-muted" th:if="${currentPage != 'Menus'}"
                th:text="${currentPage}">Page
            </li>
        </ol>
    </div>
</nav>

<div class="alert alert-success alert-dismissible fade show small" role="alert"
     th:fragment="successAlert(name, action)" th:if="${name}">
    <i class="fa fa-check-circle me-2"></i>
    Menu <strong th:text="${name}"></strong> <span th:text="${action}"></span> successfully.
    <button aria-label="Close" class="btn-close" data-bs-dismiss="alert" type="button"></button>
</div>

<!--/*@thymesVar id="menu" type="nbcc.resto.dto.Menu"*/-->
<!--/*@thymesVar id="menuItems" type="nbcc.resto.dto.MenuItem"*/-->
<th:block th:fragment="input" th:object="${menu}">
    <div class="alert alert-danger shadow-sm" role="alert" th:if="${#fields.hasGlobalErrors()}">
        <i class="fa fa-exclamation-circle me-2"></i>
        <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
    </div>
    <input th:field="*{id}" th:if="*{id != null}" type="hidden"/>
    <div class="mb-3">
        <label class="form-label text-muted text-uppercase fw-bold ls-wide" for="name">Menu Name</label>
        <input class="form-control" id="name" placeholder="e.g. Dinner Menu" th:errorclass="is-invalid"
               th:field="*{name}" type="text">
        <div class="invalid-feedback fw-medium" th:errors="*{name}"></div>
    </div>
    <div class="mb-3">
        <label class="form-label text-muted text-uppercase fw-bold ls-wide" for="description">Description</label>
        <textarea class="form-control" id="description" placeholder="(Optional) A brief description of the menu ..."
                  rows="3" th:errorclass="is-invalid" th:field="*{description}"></textarea>
        <div class="invalid-feedback fw-medium" th:errors="*{description}"></div>
    </div>
</th:block>

<th:block th:fragment="details" th:object="${menu}">
    <div class="rounded-3 overflow-hidden shadow-sm border property-grid">
        <div class="bg-dark text-white px-4 py-3 d-flex align-items-center">
            <i class="fa fa-book-open text-primary me-3 fs-5"></i>
            <h5 class="mb-0 fw-medium ls-wide text-light" th:text="*{name}">Menu Name</h5>
        </div>
        <div class="d-flex flex-column">

            <div class="row g-0 border-bottom">
                <div class="col-4 col-sm-3 p-3 d-flex align-items-center property-label-bg">
                    <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Description</span>
                </div>
                <div class="col-8 col-sm-9 p-3 d-flex align-items-center">
                    <span class="text-dark" th:text="*{description} ?: 'No description provided.'"></span>
                </div>
            </div>

            <div class="row g-0">
                <div class="col-4 col-sm-3 p-3 d-flex align-items-center property-label-bg">
                    <span class="text-accent fw-bold text-uppercase ls-wide text-sm-label">Created Date</span>
                </div>
                <div class="col-8 col-sm-9 p-3 d-flex align-items-center">
                    <span class="text-dark fw-medium"
                          th:text="${menu.createdDate != null ? #temporals.format(menu.createdDate, 'MMMM dd, yyyy h:mm a') : 'N/A'}"></span>
                </div>
            </div>

        </div>
    </div>

    <div class="mt-4" th:if="${menuItems != null}">
        <h6 class="text-accent text-uppercase mb-3 small ls-wide">
            <i class="fa fa-list-ul me-1"></i> Menu Items
        </h6>

        <div class="alert alert-info shadow-sm" th:if="${#lists.isEmpty(menuItems)}">
            <i class="fa fa-info-circle me-1"></i> No items added to this menu yet.
        </div>

        <div class="card rounded-3 shadow-sm overflow-hidden border-0" th:unless="${#lists.isEmpty(menuItems)}">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="bg-dark text-white">
                    <tr>
                        <th class="ps-4 py-3 w-25">Name</th>
                        <th class="py-3">Description</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${menuItems}">
                        <td class="ps-4 py-3 fw-medium text-dark" th:text="${item.name}"></td>
                        <td class="py-3 text-muted" th:text="${item.description}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

</body>
</html>
