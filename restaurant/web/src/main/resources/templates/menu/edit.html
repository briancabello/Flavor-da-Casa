<!DOCTYPE html>
<html lang="en"
      th:replace="~{layout :: layout(title='Edit Menu', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{menu/fragments :: menuBreadcrumb('Edit Menu', ${menu.name}, @{/menu/details/{id}(id=${menu.id})})}"></div>

    <div class="container py-4">
        <div class="mb-4">
            <h2 class="mb-0">Edit Menu</h2>
            <p class="text-accent mb-0">Update menu details and manage menu items.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-5">
                <h3 class="fs-4">Menu Details</h3>

                <div class="card shadow-sm card-top-primary mb-4">
                    <div class="card-body p-4">
                        <form method="post"
                              novalidate
                              th:action="@{/menu/edit/{id}(id=${menu.id})}"
                              th:object="${menu}">
                            <div th:replace="~{menu/fragments :: input}"></div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-save me-2"></i> Update Menu
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4"
                                   th:href="@{/menu}">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-7">
                <h3 class="fs-4">Menu Items</h3>

                <div class="card shadow-sm card-top-primary mb-4">
                    <div class="card-body p-4">
                        <form method="post"
                              novalidate
                              th:action="@{/menu/{menuId}/item/create(menuId=${menu.id})}"
                              th:object="${menuItem}">

                            <div class="alert alert-danger shadow-sm"
                                 role="alert"
                                 th:if="${#fields.hasGlobalErrors()}">
                                <i class="fa fa-exclamation-circle me-2"></i>
                                <span th:each="err : ${#fields.globalErrors()}"
                                      th:text="${err}"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide"
                                       for="itemName">
                                    Item Name
                                </label>
                                <input class="form-control"
                                       id="itemName"
                                       placeholder="e.g. Garlic Bread"
                                       th:errorclass="is-invalid"
                                       th:field="*{name}"/>
                                <div class="invalid-feedback fw-medium"
                                     th:errors="*{name}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide"
                                       for="itemDescription">
                                    Description
                                </label>
                                <textarea class="form-control"
                                          id="itemDescription"
                                          placeholder="e.g. Toasted with garlic butter"
                                          rows="3"
                                          th:errorclass="is-invalid"
                                          th:field="*{description}"></textarea>
                                <div class="invalid-feedback fw-medium"
                                     th:errors="*{description}"></div>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-plus me-2"></i> Add Item
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="alert alert-info shadow-sm"
                     th:if="${#lists.isEmpty(menuItems)}">
                    <i class="fa fa-info-circle me-1"></i>
                    There are currently no items added to this menu.
                </div>

                <div class="card rounded-3 shadow-sm overflow-hidden border-0"
                     th:unless="${#lists.isEmpty(menuItems)}">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="bg-dark text-white">
                            <tr>
                                <th class="w-25">Name</th>
                                <th>Description</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${menuItems}">
                                <td th:text="${item.name}"></td>
                                <td th:text="${item.description}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
