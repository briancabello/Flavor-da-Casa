<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Menu Details', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{menu/fragments :: menuBreadcrumb(${menu.name}, null, null)}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Menu Details</h2>
                    <a class="btn btn-outline-secondary flex-shrink-0" th:href="@{/menu}">
                        <i class="fa fa-arrow-left me-1"></i> Back to List
                    </a>
                </div>

                <p class="text-accent mb-4">
                    Reviewing the details for this menu. Use the management tools below to make adjustments or remove the entry.
                </p>

                <div class="mb-4 text-start">
                    <div th:replace="~{menu/fragments :: details}"></div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a class="btn btn-primary" th:href="@{/menu/edit/{id}(id=${menu.id})}">
                        <i class="fa fa-edit me-1"></i> Edit Menu
                    </a>
                    <a class="btn btn-danger" th:href="@{/menu/delete/{id}(id=${menu.id})}">
                        <i class="fa fa-trash me-1"></i> Delete Menu
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
