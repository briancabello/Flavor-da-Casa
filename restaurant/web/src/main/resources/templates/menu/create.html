<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Create Menu', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{menu/fragments :: menuBreadcrumb('New Menu', null, null)}"></div>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <h2>Create Menu</h2>

                <div class="card shadow-sm card-top-primary">
                    <div class="card-body p-4">
                        <form method="post" novalidate th:action="@{/menu/create}" th:object="${menu}">
                            <div th:replace="~{menu/fragments :: input}"></div>
                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit"><i class="fa fa-save me-2"></i> Save
                                    Menu
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/menu}">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
