<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Create Event', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <h1>Create New Event</h1>

        <!--/*@thymesVar id="event" type="nbcc.resto.dto.EventDto"*/-->
        <form method="post" th:action="@{/event/create}" th:object="${event}">

            <div class="mb-3">
                <label class="form-label" for="name">Event Name</label>
                <input class="form-control" th:errorclass="is-invalid" th:field="*{name}" type="text">
                <div class="alert alert-warning" th:errors="*{name}" th:if="${#fields.hasErrors('name')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-control" rows="3" th:errorclass="is-invalid" th:field="*{description}"></textarea>
                <div class="alert alert-warning" th:errors="*{description}"
                     th:if="${#fields.hasErrors('description')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="startDate">Start Date</label>
                <input class="form-control" th:errorclass="is-invalid" th:field="*{startDate}" type="date">
                <div class="alert alert-warning" th:errors="*{startDate}"
                     th:if="${#fields.hasErrors('startDate')}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="endDate">End Date</label>
                <input class="form-control" th:errorclass="is-invalid" th:field="*{endDate}" type="date">
                <div class="alert alert-warning" th:errors="*{endDate}" th:if="${#fields.hasErrors('endDate')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="duration">Duration (Minutes)</label>
                <input class="form-control" th:errorclass="is-invalid" th:field="*{duration}" type="number" min="1">
                <div class="alert alert-warning" th:errors="*{duration}" th:if="${#fields.hasErrors('duration')}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="price">Price ($)</label>
                <input class="form-control" step="0.01" th:errorclass="is-invalid" th:field="*{price}" type="number" min="0.01">
                <div class="alert alert-warning" th:errors="*{price}" th:if="${#fields.hasErrors('price')}"></div>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input" id="activeCheckbox" th:field="*{active}" type="checkbox">
                <label class="form-check-label" for="activeCheckbox">Active</label>
            </div>

            <button class="btn btn-primary" type="submit">Save Event</button>
            <a class="btn btn-secondary" th:href="@{/event}">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
