<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Event Details', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0" th:text="${eventDto.name}">Event Name</h2>
                    <a class="btn btn-outline-secondary px-3" th:href="@{/event}">
                        <i class="fa fa-arrow-left me-1"></i> Back
                    </a>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <div class="row gy-4">
                            <div class="col-12" th:with="event=${eventDto}">
                                <div th:replace="~{event/fragments :: details}"></div>
                            </div>

                            <div class="col-12">
                                <div class="p-3 bg-light rounded-3 mt-2 border">
                                    <h6 class="text-muted text-uppercase fw-bold ls-wide mb-3"><i class="fa fa-clock me-2"></i>System Audit</h6>
                                    <div class="row">
                                        <div class="col-sm-6 mb-2 mb-sm-0">
                                            <span class="text-muted small d-block">Created Date</span>
                                            <span class="fw-medium text-dark" th:text="${#temporals.format(eventDto.createdDate, 'MMMM dd, yyyy HH:mm')}"></span>
                                        </div>
                                        <div class="col-sm-6">
                                            <span class="text-muted small d-block">Last Updated</span>
                                            <span class="fw-medium text-dark" th:text="${#temporals.format(eventDto.lastUpdatedDate, 'MMMM dd, yyyy HH:mm')}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
