<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Delete Event', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <h1>Are you sure you want to delete this Event?</h1>

        <div class="alert alert-info mt-3" th:if="${event.endDate.isBefore(T(java.time.LocalDateTime).now())}">
            <strong>Note:</strong> This event is in the past and will be archived instead of permanently deleted.
        </div>

        <div class="row">
            <div class="col-md-8">
                <div th:replace="~{event/fragments :: details}"></div>
                <form class="mt-3" method="post" th:action="@{/event/delete/{id}(id=${event.id})}">
                    <input class="btn btn-danger" type="submit" value="Delete"/>
                </form>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/event}">Go Back to Events List</a>
        </div>
    </div>
</div>
</body>
</html>
