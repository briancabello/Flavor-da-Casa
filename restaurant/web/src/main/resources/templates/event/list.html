<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Events', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">

        <nav aria-label="breadcrumb" class="mb-4">
            <span class="text-muted">Home / Events</span>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-uppercase fw-bold mb-0">Events</h3>
            <a class="btn btn-primary" th:href="@{/event/create}" th:if="${viewModel.showManage}">Create Event</a>
        </div>

        <div class="mb-4">
            <h5 class="text-muted fw-bold mb-3">Find events by name or date range</h5>

            <form th:action="@{/event}" method="get" class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label for="name" class="form-label text-muted fw-bold text-uppercase" style="font-size: 0.85rem;">Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Search by name ..." th:value="${searchName}">
                </div>

                <div class="col-md-3">
                    <label for="startDate" class="form-label text-muted fw-bold text-uppercase" style="font-size: 0.85rem;">Start Date</label>
                    <input type="date" id="startDate" name="startDate" class="form-control" th:value="${searchStartDate}">
                </div>

                <div class="col-md-3">
                    <label for="endDate" class="form-label text-muted fw-bold text-uppercase" style="font-size: 0.85rem;">End Date</label>
                    <input type="date" id="endDate" name="endDate" class="form-control" th:value="${searchEndDate}">
                </div>

                <div class="col-md-3 d-flex gap-2">6
                    <button type="submit" class="btn text-white fw-bold px-4" style="background-color: #B0724A;">Search</button>

                    <a th:href="@{/event}" class="btn bg-white border border-secondary text-secondary fw-bold px-4">Clear</a>
                </div>
            </form>
        </div>

        <table class="table table-bordered table-striped align-middle">
            <thead class="table-light">
            <tr class="text-uppercase" style="font-size: 0.9rem;">
                <th>Name</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Price</th>
                <th th:if="${viewModel.showManage}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="event : ${viewModel.events}">
                <td class="fw-semibold">
                    <a class="text-decoration-none text-dark fw-bold" th:href="@{/event/details/{id}(id=${event.id})}"
                       th:text="${event.name}"></a>
                </td>

                <td th:text="${#temporals.format(event.startDate, 'MMMM dd, yyyy')}"></td>

                <td th:text="${#temporals.format(event.endDate, 'MMMM dd, yyyy')}"></td>

                <td th:text="${'$' + #numbers.formatDecimal(event.price, 1, 2)}"></td>

                <td th:if="${viewModel.showManage}">
                    <a class="text-primary text-decoration-none me-3 fw-bold"
                       th:href="@{/event/edit/{id}(id=${event.id})}">EDIT</a>
                    <a class="text-danger text-decoration-none fw-bold" th:href="@{/event/delete/{id}(id=${event.id})}">DELETE</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(viewModel.events)}">
                <td class="text-center text-muted py-4" colspan="6">No events found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
