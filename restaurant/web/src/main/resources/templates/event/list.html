<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Events', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{event/fragments :: eventBreadcrumb('Events', null, null)}"></div>

    <div class="container py-4">
        <div th:replace="~{event/fragments :: successAlert(${eventName}, ${action})}"></div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Events</h2>
            <a class="btn btn-primary" th:href="@{/event/create}" th:if="${viewModel.showManage}">
                <i class="fa fa-plus me-1"></i> Create Event
            </a>
        </div>

        <div class="mb-3">
            <h5 class="text-accent text-uppercase mb-3 small ls-wide">
                Find events by name or date range
            </h5>

            <form class="row g-3" method="get" th:action="@{/event}">

                <div class="col-md-3">
                    <label class="form-label text-muted text-uppercase" for="name" style="font-size: 0.85rem;">Name</label>
                    <input class="form-control" id="name" name="name" placeholder="Search by name ..."
                           th:value="${searchName}" type="text">
                </div>

                <div class="col-md-3">
                    <label class="form-label text-muted text-uppercase" for="startDate"
                           style="font-size: 0.85rem;">Start Date</label>
                    <input class="form-control" id="startDate" name="startDate" th:value="${searchStartDate}"
                           type="date">
                </div>

                <div class="col-md-3">
                    <label class="form-label text-muted text-uppercase" for="endDate"
                           style="font-size: 0.85rem;">End Date</label>
                    <input class="form-control" id="endDate" name="endDate" th:value="${searchEndDate}" type="date">
                </div>

                <div class="col-md-3">
                    <label class="form-label d-none d-md-block opacity-0" style="font-size: 0.85rem;">Spacer</label>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary w-100" type="submit">
                            <i class="fa fa-search me-1"></i> Search
                        </button>

                        <a class="btn btn-outline-secondary w-100" th:href="@{/event}">
                            <i class="fa fa-undo me-1"></i> Clear
                        </a>
                    </div>
                </div>

            </form>
        </div>

        <div class="alert alert-info" th:if="${#lists.isEmpty(viewModel.events)}">No events found.</div>

        <div class="card rounded-2 shadow-sm overflow-hidden" th:unless="${#lists.isEmpty(viewModel.events)}">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="bg-dark">
                    <tr>
                        <th class="w-25">Name</th>
                        <th class="text-nowrap">Start Date</th>
                        <th class="text-nowrap">End Date</th>
                        <th class="text-nowrap">Price</th>
                        <th class="text-center">Status</th>
                        <th class="text-center" th:if="${viewModel.showManage}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${viewModel.events}">
                        <td>
                            <a class="text-decoration-none text-primary"
                               th:href="@{/event/details/{id}(id=${event.id})}"
                               th:text="${event.name}"></a>
                        </td>
                        <td th:text="${#temporals.format(event.startDate, 'MMMM dd, yyyy')}"></td>
                        <td th:text="${#temporals.format(event.endDate, 'MMMM dd, yyyy')}"></td>
                        <td th:text="${'$' + #numbers.formatDecimal(event.price, 1, 2)}"></td>

                        <td class="text-center">
                            <span th:class="${event.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                  th:text="${event.active ? 'Active' : 'Inactive'}">
                            </span>
                        </td>

                        <td class="text-center" th:if="${viewModel.showManage}">
                            <a class="text-decoration-none me-3" th:href="@{/event/edit/{id}(id=${event.id})}"
                               title="Edit Event">
                                <i class="fa fa-edit text-primary fs-5"></i>
                            </a>

                            <a class="text-decoration-none" th:href="@{/event/delete/{id}(id=${event.id})}"
                               title="Delete Event">
                                <i class="fa fa-trash text-danger fs-5"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
