<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events List</title>
    <link th:replace="~{partial :: bootstrap}"/>
</head>
<body>
<div th:insert="~{nav :: navbar}"></div>

<div class="container mt-4">

    <nav aria-label="breadcrumb" class="mb-4">
        <span class="text-muted">Home / Events</span>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-uppercase fw-bold mb-0">Events</h3>
        <a th:if="${viewModel.showManage}" class="btn btn-primary" th:href="@{/events/create}">Create Event</a>
    </div>

    <table class="table table-bordered table-striped align-middle">
        <thead class="table-light">
        <tr class="text-uppercase" style="font-size: 0.9rem;">
            <th>Name</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Price</th>
            <th th:if="${viewModel.showManage}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${viewModel.events}">
            <td th:text="${event.name}" class="fw-semibold"></td>

            <td th:text="${#temporals.format(event.startDate, 'MMMM dd, yyyy')}"></td>

            <td th:text="${#temporals.format(event.endDate, 'MMMM dd, yyyy')}"></td>

            <td th:text="${'$' + #numbers.formatDecimal(event.price, 1, 2)}"></td>

            <td th:if="${viewModel.showManage}">
                <a class="text-primary text-decoration-none me-3 fw-bold" th:href="@{/events/edit/{id}(id=${event.id})}">EDIT...</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(viewModel.events)}">
            <td colspan="6" class="text-center text-muted py-4">No events found.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
