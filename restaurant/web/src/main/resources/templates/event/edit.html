<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Edit Event', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">

                <h2 class="fw-bold mb-4">Edit Event</h2>

                <div class="card shadow-sm card-top-primary">
                    <div class="card-body p-4">
                        <form method="post" th:action="@{/event/edit/{id}(id=${event.id})}" th:object="${event}" novalidate>

                            <div th:replace="~{event/fragments :: input}"></div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-save me-2"></i> Update Event
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/event}">Cancel</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
