<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Edit Event', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <h1 class="mb-4 text-uppercase fw-bold">Edit Event</h1>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" th:action="@{/event/edit/{id}(id=${event.id})}" th:object="${event}">

                    <input th:field="*{id}" type="hidden"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="name">Event Name</label>
                        <input class="form-control" th:errorclass="is-invalid" th:field="*{name}" type="text">
                        <div class="invalid-feedback" th:errors="*{name}" th:if="${#fields.hasErrors('name')}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="description">Description</label>
                        <textarea class="form-control" rows="3" th:errorclass="is-invalid"
                                  th:field="*{description}"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"
                             th:if="${#fields.hasErrors('description')}"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="startDate">Start Date</label>
                            <input class="form-control" th:errorclass="is-invalid" th:field="*{startDate}"
                                   type="datetime-local">
                            <div class="invalid-feedback" th:errors="*{startDate}"
                                 th:if="${#fields.hasErrors('startDate')}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="endDate">End Date</label>
                            <input class="form-control" th:errorclass="is-invalid" th:field="*{endDate}"
                                   type="datetime-local">
                            <div class="invalid-feedback" th:errors="*{endDate}"
                                 th:if="${#fields.hasErrors('endDate')}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="duration">Duration (Minutes)</label>
                            <input class="form-control" th:errorclass="is-invalid" th:field="*{duration}" type="number">
                            <div class="invalid-feedback" th:errors="*{duration}"
                                 th:if="${#fields.hasErrors('duration')}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="price">Price ($)</label>
                            <input class="form-control" step="0.01" th:errorclass="is-invalid" th:field="*{price}"
                                   type="number">
                            <div class="invalid-feedback" th:errors="*{price}"
                                 th:if="${#fields.hasErrors('price')}"></div>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input class="form-check-input" id="activeCheckbox" th:field="*{active}" type="checkbox">
                        <label class="form-check-label" for="activeCheckbox">Event is Active</label>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a class="btn btn-secondary" th:href="@{/event}">Cancel</a>
                        <button class="btn btn-primary" type="submit">Update Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
