<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Edit Table</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-4">
    <main class="pb-3" role="main">
        <div class="row">
            <div class="col-md-6">
                <form method="post" th:action="@{/table/edit/{id}(id=${diningTable.id})}" th:object="${diningTable}">
                    <div th:replace="~{table/fragments :: input}"></div>
                    <div class="form-group mt-3">
                        <input class="btn btn-primary" type="submit" value="Save"/>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/table}">Go Back</a>
        </div>
    </main>
</div>
</body>
</html>
