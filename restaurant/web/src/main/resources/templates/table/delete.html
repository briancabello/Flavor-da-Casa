<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Delete Table</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-4">
    <main class="pb-3" role="main">
        <h1>Are you sure you want to delete this Dining Table?</h1>

        <div class="row">
            <div class="col-md-6">
                <div th:replace="~{table/fragments :: details}"></div>
                <form class="mt-3" method="post" th:action="@{/table/delete/{id}(id=${diningTable.id})}">
                    <input class="btn btn-danger" type="submit" value="Delete"/>
                </form>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/table}">Go Back</a>
        </div>
    </main>
</div>
</body>
</html>
