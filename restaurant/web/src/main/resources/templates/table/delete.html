<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Delete Table', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{table/fragments :: tableBreadcrumb('Delete Table', ${diningTable.name}, @{/table/details/{id}(id=${diningTable.id})})}"></div>

    <div class="container py-4">
        <div class="row justify-content-center text-center">
            <div class="col-12 col-md-8 col-lg-6">
                <i class="fas fa-exclamation-triangle text-danger fa-4x mb-3"></i>

                <h2 class="fw-bold mb-1">Delete Dining Table</h2>

                <p class="text-accent mb-4">
                    Are you sure you want to delete this dining table? This action cannot be undone.
                </p>

                <div class="card shadow-sm border-0 mb-4 text-start">
                    <div class="card-body p-4 bg-white rounded-3">
                        <div th:replace="~{table/fragments :: details}"></div>
                    </div>
                </div>

                <form method="post" th:action="@{/table/delete/{id}(id=${diningTable.id})}">
                    <button class="btn btn-danger px-4" type="submit">
                        <i class="fa fa-trash me-2"></i> Confirm Delete
                    </button>
                    <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/table}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
