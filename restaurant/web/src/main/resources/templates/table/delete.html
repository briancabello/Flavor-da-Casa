<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Delete Table', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <h2 class="fw-bold mb-4">Delete Dining Table</h2>
        <div class="row">
            <div class="col-md-6">
                <div class="alert alert-danger">
                    <i class="fa fa-exclamation-triangle me-2"></i>
                    Are you sure you want to delete this dining table? This action cannot be undone.
                </div>
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <div th:replace="~{table/fragments :: details}"></div>
                    </div>
                </div>
                <form class="mt-3" method="post" th:action="@{/table/delete/{id}(id=${diningTable.id})}">
                    <button class="btn btn-danger" type="submit">
                        <i class="fa fa-trash me-1"></i> Confirm Delete
                    </button>
                    <a class="btn btn-link ms-2" th:href="@{/table}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
