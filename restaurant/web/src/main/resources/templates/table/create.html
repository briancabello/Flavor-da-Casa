<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Create Table', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <h2>Create Dining Table</h2>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <form method="post" th:action="@{/table/create}" th:object="${diningTable}">
                            <div th:replace="~{table/fragments :: input}"></div>
                            <button class="btn btn-primary" type="submit">
                                <i class="fa fa-save me-1"></i> Save Table
                            </button>
                            <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/table}">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
