<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Dining Tables</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-4">
    <main class="pb-3" role="main">
        <!--/*@thymesVar id="viewModel" type="nbcc.resto.viewmodels.DiningTableListViewModel"*/-->
        <p class="alert alert-warning" th:if="${viewModel.message}" th:text="${viewModel.message}"></p>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Dining Tables</h2>
            <a class="btn btn-success" th:href="@{/table/create}" th:if="${viewModel.canAdd}">+ Add Table</a>
        </div>

        <p class="alert alert-info" th:if="${viewModel.isEmpty()}">No dining tables have been created yet.</p>

        <table class="table table-striped table-hover" th:unless="${viewModel.isEmpty()}">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Capacity</th>
                <th class="text-center" th:if="${viewModel.canEdit}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="table : ${viewModel.tables}">
                <td th:text="${table.name}"></td>
                <td th:text="${table.capacity}"></td>
                <td class="text-center" th:if="${viewModel.canEdit}">
                    <div class="btn-group btn-group-sm">
                        <a class="btn btn-outline-primary" th:href="@{/table/edit/{id}(id=${table.id})}">Edit</a>
                        <a class="btn btn-outline-danger" th:href="@{/table/delete/{id}(id=${table.id})}">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
</body>
</html>
