<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!--/*@thymesVar id="diningTable" type="nbcc.resto.dto.DiningTable"*/-->

<th:block th:fragment="input" th:object="${diningTable}">
    <div class="alert alert-danger" role="alert" th:if="${#fields.hasGlobalErrors()}">
        <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
    </div>

    <input th:field="*{id}" type="hidden"/>

    <div class="mb-3">
        <label class="form-label fw-bold" for="name">Name</label>
        <input class="form-control" id="name" placeholder="Leave blank to auto-generate (e.g. Table 1, Table 2...)"
               th:field="*{name}"/>
        <div class="form-text text-muted">Optional. If left blank, a name will be generated automatically.</div>
        <div class="text-danger small mt-1" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold" for="capacity">Capacity</label>
        <input class="form-control" id="capacity" min="1" placeholder="Enter number of seats"
               th:field="*{capacity}" type="number"/>
        <div class="text-danger small mt-1" th:errors="*{capacity}"></div>
    </div>
</th:block>

<th:block th:fragment="details">
    <!--/*@thymesVar id="diningTable" type="nbcc.resto.dto.DiningTable"*/-->
    <dl class="row mb-0">
        <dt class="col-sm-4">Name</dt>
        <dd class="col-sm-8" th:text="${diningTable.name}"></dd>
        <dt class="col-sm-4">Capacity</dt>
        <dd class="col-sm-8" th:text="${diningTable.capacity}"></dd>
    </dl>
</th:block>

</body>
</html>
