<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Create Seating', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <h2>Create Seating</h2>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form method="post" th:action="@{/seating/create}" th:object="${seating}" novalidate>
                            <div th:replace="~{seating/fragments :: input}"></div>

                            <div class="mt-4 pt-3 border-top">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa fa-save me-2"></i> Save Seating
                                </button>
                                <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/seating}">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
