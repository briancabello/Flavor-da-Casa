<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Delete Seating', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div th:replace="~{seating/fragments :: seatingBreadcrumb('Delete Seating', null, null)}"></div>

    <div class="container py-4">
        <div class="row justify-content-center text-center">
            <div class="col-12 col-md-8 col-lg-6">
                <i class="fas fa-exclamation-triangle text-danger fa-4x mb-3"></i>
                <h2 class="fw-bold mb-1">Delete Seating</h2>
                <p class="text-accent mb-4" th:if="${isArchive}">
                    This seating has reservations and will be <strong>archived</strong> instead of deleted.
                    It will no longer be visible except when displaying reservation details.
                </p>
                <p class="text-accent mb-4" th:unless="${isArchive}">
                    Are you sure you want to delete this seating? This action cannot be undone.
                </p>

                <div class="card shadow-sm border-0 mb-4 text-start">
                    <div class="card-body p-4 bg-white rounded-3">
                        <div th:replace="~{seating/fragments :: details}"></div>
                    </div>
                </div>

                <form method="post" th:action="@{/seating/delete/{id}(id=${seating.id})}">
                    <button class="btn btn-danger px-4" type="submit" th:if="${isArchive}">
                        <i class="fa fa-archive me-2"></i> Confirm Archive
                    </button>
                    <button class="btn btn-danger px-4" type="submit" th:unless="${isArchive}">
                        <i class="fa fa-trash me-2"></i> Confirm Delete
                    </button>
                    <a class="btn btn-outline-secondary ms-2 px-4" th:href="@{/seating}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
