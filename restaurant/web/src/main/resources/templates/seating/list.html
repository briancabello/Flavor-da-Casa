<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Seatings', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <p class="alert alert-warning" th:if="${viewModel.message}" th:text="${viewModel.message}"></p>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Seatings by Event</h2>
            <a class="btn btn-primary" th:href="@{/seating/create}" th:if="${viewModel.canAdd}">
                <i class="fa fa-plus me-1"></i> Create Seating
            </a>
        </div>

        <div class="alert alert-info" th:if="${viewModel.isEmpty()}">
            There are currently no upcoming events scheduled.
        </div>

        <div th:unless="${viewModel.isEmpty()}">
            <div class="card rounded-2 shadow-sm mb-4 overflow-hidden" th:each="event : ${viewModel.events}">
                <div class="card-header bg-dark text-light">
                    <h6 class="mb-0">
                        <i class="fa fa-calendar-alt text-primary me-1"></i>
                        <span th:text="${event.name}">Event Name</span>
                    </h6>
                </div>

                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="w-25">Seating Name</th>
                            <th class="text-nowrap">Date</th>
                            <th class="text-nowrap">Time</th>
                            <th class="text-nowrap">Duration</th>
                            <th class="w-25">Tables</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${!viewModel.hasSeatings(event.id)}">
                            <td class="text-muted text-center" colspan="5">
                                There are currently no seatings booked for this event.
                            </td>
                        </tr>

                        <tr th:each="seating : ${viewModel.seatings}" th:if="${seating.eventId == event.id}">
                            <td class="fw-medium text-dark" th:text="${seating.name}"></td>
                            <td th:text="${#temporals.format(seating.startDateTime, 'MMMM dd, yyyy')}"></td>
                            <td>
                                <span th:text="${#temporals.format(seating.startDateTime, 'h:mm a')}"></span>
                                <span class="text-muted mx-1">&mdash;</span>
                                <span th:text="${seating.endDateTime != null ? #temporals.format(seating.endDateTime, 'h:mm a') : '-'}"></span>
                            </td>
                            <td><span th:text="${seating.duration}"></span> min</td>
                            <td>
                                <span class="badge bg-secondary me-1" th:each="table, stat : ${seating.tables}"
                                      th:text="${table.name}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
