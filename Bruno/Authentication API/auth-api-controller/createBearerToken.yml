info:
  name: createBearerToken
  type: http
  seq: 2
  tags:
    - auth-api-controller

http:
  method: POST
  url: "{{authUrl}}/api/auth/token"
  body:
    type: json
    data: |-
      {
        "username": "employee",
        "password": "nbcc"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
