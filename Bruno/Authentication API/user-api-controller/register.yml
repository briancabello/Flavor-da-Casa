info:
  name: register
  type: http
  seq: 1
  tags:
    - user-api-controller

http:
  method: POST
  url: "{{authUrl}}/api/user/register"
  body:
    type: json
    data: |-
      {
        "username": "",
        "password": "",
        "email": "",
        "enabled": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/user/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "username": "",
            "password": "",
            "email": "",
            "enabled": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "authenticated": false,
            "validationErrors": [
              {
                "field": "",
                "message": "",
                "value": ""
              }
            ],
            "successful": false,
            "invalid": false,
            "value": {
              "id": 0,
              "username": "",
              "email": "",
              "enabled": false,
              "locked": false,
              "name": ""
            },
            "empty": false,
            "error": false
          }
