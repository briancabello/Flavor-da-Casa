info:
  name: Get all Events
  type: http
  seq: 1
  tags:
    - Event_API

http:
  method: GET
  url: "{{apiUrl}}/api/event"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/event"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "value": [
              {
                "id": 0,
                "menu": {
                  "id": 0,
                  "name": "",
                  "description": "",
                  "createdDate": ""
                },
                "name": "",
                "description": "",
                "startDate": "",
                "endDate": "",
                "duration": 0,
                "price": 0,
                "active": false,
                "archived": false,
                "createdDate": "",
                "lastUpdatedDate": "",
                "menuId": 0
              }
            ],
            "empty": false,
            "invalid": false,
            "error": false,
            "successful": false
          }
