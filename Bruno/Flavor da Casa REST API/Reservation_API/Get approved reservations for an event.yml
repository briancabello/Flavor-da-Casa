  type: http
  seq: 1
  tags:
    - Reservation_API

http:
  method: GET
  url: "{{apiUrl}}/api/reservation/event/:eventId/confirmed"
  params:
    - name: eventId
      value: ""
      type: path
  auth: inherit

settings:
