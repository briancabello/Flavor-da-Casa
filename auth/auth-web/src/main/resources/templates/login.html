<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Login', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <div class="auth-icon-box d-inline-flex align-items-center justify-content-center rounded-3 shadow-sm mb-3">
                        <i class="fas fa-key text-light fs-2"></i>
                    </div>

                    <h2 class="fw-bold mb-2">Welcome Back</h2>

                    <p class="text-muted small px-3">
                        We're thrilled to see you again! Sign in to manage your restaurant's daily operations and prep
                        for another amazing day of service.
                    </p>
                </div>

                <div class="card shadow-sm border-0 card-top-primary">
                    <div class="card-body p-4 p-md-5">

                        <div class="alert alert-danger shadow-sm d-flex align-items-center py-2" th:if="${param.error}">
                            <i class="fa fa-exclamation-circle me-2"></i>
                            <div>Invalid username or password.</div>
                        </div>

                        <div class="alert alert-success shadow-sm d-flex align-items-center py-2"
                             th:if="${param.logout}">
                            <i class="fa fa-check-circle me-2"></i>
                            <div>You have been logged out successfully.</div>
                        </div>

                        <form method="post" th:action="@{/login}">

                            <div class="mb-4">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide text-sm-label"
                                       for="username">Username</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fa fa-user"></i>
                                    </span>
                                    <input class="form-control border-start-0 ps-0 py-2" id="username" name="username"
                                           placeholder="Enter your username" required
                                           th:value="${param.username}" type="text"/>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide text-sm-label"
                                       for="password">Password</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fa fa-lock"></i>
                                    </span>
                                    <input class="form-control border-start-0 ps-0 py-2" id="password" name="password"
                                           placeholder="Enter your password" required
                                           type="password"/>
                                </div>
                            </div>

                            <div class="mt-4 pt-2">
                                <button class="btn btn-primary w-100 py-2 fw-bold text-uppercase ls-wide shadow-sm"
                                        type="submit">
                                    Login <i class="fa fa-arrow-right ms-2"></i>
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
