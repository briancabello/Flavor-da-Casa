<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Login', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h2 class="text-center">Login</h2>

                <div class="alert alert-danger text-center" th:if="${param.error}">
                    <div>Invalid username or password.</div>
                </div>

                <form method="post" th:action="@{/login}">
                    <div class="form-group">
                        <label class="control-label">Username:
                            <input class="form-control" name="username" placeholder="Username" required
                                   th:value="${param.username}" type="text"/>
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="control-label">Password:
                            <input class="form-control" name="password" placeholder="Password" required
                                   type="password"/>
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="control-label">
                            <input class="btn btn-primary" type="submit" value="Login"/>
                        </label>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
