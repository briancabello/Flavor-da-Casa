<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Register', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <div class="auth-icon-box d-inline-flex align-items-center justify-content-center rounded-3 shadow-sm mb-3">
                        <i class="fas fa-user-plus text-light fs-2"></i>
                    </div>

                    <h2 class="fw-bold mb-2">Create Account</h2>

                    <p class="text-muted small px-3">
                        Welcome to the family! We are so excited to have you join us. Create your account below to start
                        organizing tables and events.
                    </p>
                </div>

                <div class="card shadow-sm border-0 card-top-primary">
                    <div class="card-body p-4 p-md-5">

                        <div class="alert alert-warning shadow-sm d-flex align-items-center py-2"
                             th:unless="${message == null}">
                            <i class="fa fa-exclamation-triangle me-2"></i>
                            <div th:text="${message}"></div>
                        </div>

                        <form method="post" novalidate th:action="@{/register}" th:object="${user}">

                            <div class="mb-4">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide text-sm-label"
                                       for="username">Username</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fa fa-user"></i>
                                    </span>
                                    <input class="form-control border-start-0 ps-0 py-2" id="username"
                                           placeholder="Choose a username"
                                           th:errorclass="is-invalid" th:field="*{username}" type="text"/>
                                </div>
                                <div class="text-danger small mt-1 fw-medium" th:errors="*{username}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide text-sm-label"
                                       for="email">Email Address</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fa fa-envelope"></i>
                                    </span>
                                    <input class="form-control border-start-0 ps-0 py-2" id="email" placeholder="Enter your email"
                                           th:errorclass="is-invalid" th:field="*{email}" type="email"/>
                                </div>
                                <div class="text-danger small mt-1 fw-medium" th:errors="*{email}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted text-uppercase fw-bold ls-wide text-sm-label"
                                       for="password">Password</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fa fa-lock"></i>
                                    </span>
                                    <input class="form-control border-start-0 ps-0 py-2" id="password"
                                           placeholder="Create a password"
                                           th:errorclass="is-invalid" th:field="*{password}" type="password"/>
                                </div>
                                <div class="text-danger small mt-1 fw-medium" th:errors="*{password}"></div>
                            </div>

                            <div class="mt-4 pt-2">
                                <button class="btn btn-primary w-100 py-2 fw-bold text-uppercase ls-wide shadow-sm"
                                        type="submit">
                                    Register <i class="fa fa-arrow-right ms-2"></i>
                                </button>
                            </div>

                        </form>

                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted small mb-0">
                                Already have an account?
                                <a class="text-primary fw-bold text-decoration-none" th:href="@{/login}">Log in here</a>
                            </p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
