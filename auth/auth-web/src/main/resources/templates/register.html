<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Register', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-4">
        <h1>Register</h1>
        <h4>User</h4>
        <hr/>
        <div class="alert alert-warning" th:text="${message}" th:unless="${message == null}"></div>

        <!--/*@thymesVar id="user" type="nbcc.auth.domain.UserRegistration"*/-->
        <form method="post" th:action="@{/register}" th:object="${user}">
            <div>
                <div class="form-group">
                    <label class="form-label">User Name:
                        <input class="form-control" th:field="*{username}"/>
                    </label>
                    <div class="alert alert-warning" th:errors="*{username}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email:
                        <input class="form-control" th:field="*{email}"/>
                    </label>
                    <div class="alert alert-warning" th:errors="*{email}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password:
                        <input class="form-control" th:field="*{password}" type="password"/>
                    </label>
                    <div class="alert alert-warning" th:errors="*{password}"></div>
                </div>
            </div>
            <input class="btn btn-primary" type="submit" value="Register"/>
        </form>
    </div>
</div>
</body>
</html>
