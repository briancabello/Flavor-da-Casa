<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Error', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                <h1 class="display-5 fw-bold mb-3">Something Went Wrong</h1>
                <!--/*@thymesVar id="message" type="java.lang.String"*/-->
                <p class="lead text-muted" th:if="${message}" th:text="${message}"></p>
                <p class="lead text-muted" th:unless="${message}">An unexpected error occurred. Please try again.</p>
                <a class="btn btn-primary mt-2" th:href="@{/}">Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
