<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(title='Page Not Found', content=~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                <h1 class="display-2 fw-bold mb-3">404</h1>
                <h2 class="mb-3">Page Not Found</h2>
                <!--/*@thymesVar id="message" type="java.lang.String"*/-->
                <p class="lead text-muted" th:if="${message}" th:text="${message}"></p>
                <p class="lead text-muted" th:unless="${message}">
                    The page you are looking for does not exist or has been moved.
                </p>
                <a class="btn btn-primary mt-2" th:href="@{/}">Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
