<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nav</title>
    <th:block th:replace="~{partial :: bootstrap}"/>
</head>
<body>
<header>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg">
        <!--/*@thymesVar id="navViewModel" type="nbcc.common.viewmodel.NavViewModel"*/-->
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">Home</a>
            <ul class="navbar-nav flex-grow-1">
                <li class="nav-item nav-link px-2" th:if="${navViewModel.showAlbums}">
                    <a th:href="@{/album}">Albums</a>
                </li>
            </ul>
            <ul class="navbar-nav flex-grow-1">
                <li class="nav-item" th:if="${navViewModel.showRegisterLink}">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item" th:if="${navViewModel.showLoginLink}">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" th:if="${navViewModel.showUserName}">
                    <span class="nav-link" th:text="*{navViewModel.username}"></span>
                </li>
                <li class="nav-item" th:if="${navViewModel.showLogoutButton}">
                    <form class="form-inline" th:action="@{/logout}" method="post">
                        <input class="nav-link btn btn-link text-dark" type="submit" value="Logout"/>
                    </form>
                </li>
            </ul>
        </div>
    </nav>
</header>
</body>
</html>
